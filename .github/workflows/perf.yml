name: Performance Tests

on:
  workflow_dispatch:
    inputs:
      users:
        description: "Concurrent users"
        required: false
        default: "50"
      run_time:
        description: "Test duration (e.g. 60s, 2m)"
        required: false
        default: "60s"
      host:
        description: "Target host URL"
        required: false
        default: "http://localhost:4009"

jobs:
  perf:
    name: Locust Performance Baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv==0.6.0

      - name: Install perf dependencies
        run: uv pip install --system ".[perf]" pyotp

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and start stack
        run: |
          docker build -t openwhistle:perf .
          cat > docker-compose.perf.yml <<'EOF'
          services:
            app:
              image: openwhistle:perf
              environment:
                DATABASE_URL: "postgresql+asyncpg://openwhistle:openwhistle@db:5432/openwhistle"
                REDIS_URL: "redis://redis:6379/0"
                SECRET_KEY: "perf-test-secret-key-not-for-production"
                DEMO_MODE: "true"
              ports:
                - "4009:4009"
              depends_on:
                db:
                  condition: service_healthy
                redis:
                  condition: service_healthy
            db:
              image: postgres:18-alpine
              environment:
                POSTGRES_USER: openwhistle
                POSTGRES_PASSWORD: openwhistle
                POSTGRES_DB: openwhistle
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U openwhistle -d openwhistle"]
                interval: 5s
                timeout: 5s
                retries: 10
            redis:
              image: redis:8-alpine
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 5s
                timeout: 5s
                retries: 10
          EOF
          docker compose -f docker-compose.perf.yml up -d
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4009/health || true)
            [ "$status" = "200" ] && break
            sleep 3
          done
          curl -sf http://localhost:4009/health | grep -q '"status":"ok"'

      - name: Run Locust
        run: |
          locust \
            -f tests/perf/locustfile.py \
            --headless \
            -u ${{ github.event.inputs.users || '50' }} \
            -r 5 \
            --run-time ${{ github.event.inputs.run_time || '60s' }} \
            --host http://localhost:4009 \
            --html perf-report.html \
            --csv perf-results

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.run_id }}
          path: |
            perf-report.html
            perf-results_*.csv
          retention-days: 30

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.perf.yml down -v
