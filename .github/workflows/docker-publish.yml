name: Publish Docker Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish"
        required: true
        default: "latest"

env:
  IMAGE_NAME: openwhistle

jobs:
  # ── Always: push to GitHub Container Registry ─────────────────────────────
  push-ghcr:
    name: Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/openwhistle/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Sign images with Cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

  # ── Optional: push to Docker Hub ──────────────────────────────────────────
  # Activate by adding DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repository secrets.
  push-dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check Docker Hub credentials
        id: check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "DOCKERHUB_USERNAME secret not set — skipping Docker Hub push."
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.enabled == 'true'

      - name: Set up Docker Buildx
        if: steps.check.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        if: steps.check.outputs.enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: docker.io/openwhistle/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Log in to Docker Hub
        if: steps.check.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Optional: push to Quay.io ─────────────────────────────────────────────
  # Activate by adding QUAY_USERNAME + QUAY_TOKEN repository secrets.
  push-quay:
    name: Push to Quay.io
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check Quay.io credentials
        id: check
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
        run: |
          if [ -n "${QUAY_USERNAME}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "QUAY_USERNAME secret not set — skipping Quay.io push."
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.enabled == 'true'

      - name: Set up Docker Buildx
        if: steps.check.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        if: steps.check.outputs.enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: quay.io/openwhistle/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Log in to Quay.io
        if: steps.check.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
