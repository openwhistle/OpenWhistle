name: Publish Docker Images

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish"
        required: true
        default: "latest"

env:
  IMAGE_NAME: openwhistle
  # Opt into Node.js 24 for all JS-based actions to suppress the Node 20
  # deprecation warning that fires on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Always: push to GitHub Container Registry ─────────────────────────────
  push-ghcr:
    name: Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/openwhistle/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=edge,branch=main
            type=sha,prefix=sha-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Sign images with Cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

  # ── Optional: push to Docker Hub ──────────────────────────────────────────
  # Activate by adding DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repository secrets.
  # Secrets are mapped to env vars so they can be checked in step `if` conditions
  # (the secrets context is not available at step level, but env context is).
  push-dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        if: env.DOCKERHUB_TOKEN != ''

      - name: Set up Docker Buildx
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=edge,branch=main
            type=sha,prefix=sha-

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Optional: push to Quay.io ─────────────────────────────────────────────
  # Activate by adding QUAY_USERNAME + QUAY_TOKEN + QUAY_NAMESPACE secrets.
  # QUAY_NAMESPACE is the plain account/org name (e.g. jp1337) — separate from
  # QUAY_USERNAME which may be a robot account containing a + character that is
  # invalid in image references.
  push-quay:
    name: Push to Quay.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        if: env.QUAY_TOKEN != ''

      - name: Set up Docker Buildx
        if: env.QUAY_TOKEN != ''
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        if: env.QUAY_TOKEN != ''
        uses: docker/metadata-action@v5
        with:
          images: quay.io/${{ secrets.QUAY_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=edge,branch=main
            type=sha,prefix=sha-

      - name: Log in to Quay.io
        if: env.QUAY_TOKEN != ''
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push
        if: env.QUAY_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
