name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv==0.6.0

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Run ruff (linting)
        run: ruff check app/ tests/

      - name: Run mypy (type checking)
        run: mypy app/ --strict

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: openwhistle
          POSTGRES_PASSWORD: openwhistle
          POSTGRES_DB: openwhistle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv==0.6.0

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: "postgresql+asyncpg://openwhistle:openwhistle@localhost:5432/openwhistle_test"
          REDIS_URL: "redis://localhost:6379/0"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEMO_MODE: "true"
          COVERAGE_CORE: "sysmon"
        run: pytest --cov=app --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
        continue-on-error: true

  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: openwhistle:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — start full stack and verify /health
        run: |
          # Write a minimal compose override for CI
          cat > docker-compose.ci.yml <<'EOF'
          services:
            app:
              image: openwhistle:ci
              environment:
                DATABASE_URL: "postgresql+asyncpg://openwhistle:openwhistle@db:5432/openwhistle"
                REDIS_URL: "redis://redis:6379/0"
                SECRET_KEY: "ci-smoke-test-secret-not-for-production"
                DEMO_MODE: "false"
              ports:
                - "4009:4009"
              depends_on:
                db:
                  condition: service_healthy
                redis:
                  condition: service_healthy
            db:
              image: postgres:18-alpine
              environment:
                POSTGRES_USER: openwhistle
                POSTGRES_PASSWORD: openwhistle
                POSTGRES_DB: openwhistle
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U openwhistle -d openwhistle"]
                interval: 5s
                timeout: 5s
                retries: 10
            redis:
              image: redis:8-alpine
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 5s
                timeout: 5s
                retries: 10
          EOF

          docker compose -f docker-compose.ci.yml up -d

          # Wait up to 60s for /health to return 200
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4009/health || true)
            if [ "$status" = "200" ]; then
              echo "✓ Health check passed (attempt $i)"
              break
            fi
            echo "Attempt $i: status=$status — waiting..."
            sleep 2
          done

          # Assert health endpoint returns ok
          response=$(curl -s http://localhost:4009/health)
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"'

          # Assert /setup is reachable (wizard available on fresh DB)
          setup_status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4009/setup)
          echo "Setup page status: $setup_status"
          [ "$setup_status" = "200" ]

          docker compose -f docker-compose.ci.yml down -v
