services:
  app:
    build: .
    ports:
      - "4009:4009"
    environment:
      DATABASE_URL: "postgresql+asyncpg://openwhistle:openwhistle@db:5432/openwhistle"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "change-me-in-production-use-a-long-random-string"
      DEMO_MODE: "false"
    volumes:
      - ./app/static:/app/app/static
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: openwhistle
      POSTGRES_PASSWORD: openwhistle
      POSTGRES_DB: openwhistle
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwhistle -d openwhistle"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: redis-server --save "" --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
