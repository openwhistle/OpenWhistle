services:
  app:
    image: ghcr.io/openwhistle/openwhistle:latest
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "${REDIS_URL}"
      SECRET_KEY: "${SECRET_KEY}"
      DEMO_MODE: "${DEMO_MODE:-false}"
      SUBMISSION_MODE_ENABLED: "${SUBMISSION_MODE_ENABLED:-true}"
      OIDC_ENABLED: "${OIDC_ENABLED:-false}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_SERVER_METADATA_URL: "${OIDC_SERVER_METADATA_URL:-}"
      OIDC_REDIRECT_URI: "${OIDC_REDIRECT_URI:-}"
      BRAND_PRIMARY_COLOR: "${BRAND_PRIMARY_COLOR:-#0f4c81}"
      BRAND_SECONDARY_COLOR: "${BRAND_SECONDARY_COLOR:-#b07230}"
      BRAND_LOGO_URL: "${BRAND_LOGO_URL:-}"
      APP_PUBLIC_URL: "${APP_PUBLIC_URL:-http://localhost}"
      NOTIFY_EMAIL_ENABLED: "${NOTIFY_EMAIL_ENABLED:-false}"
      NOTIFY_EMAIL_TO: "${NOTIFY_EMAIL_TO:-}"
      NOTIFY_EMAIL_FROM: "${NOTIFY_EMAIL_FROM:-openwhistle@localhost}"
      NOTIFY_SMTP_HOST: "${NOTIFY_SMTP_HOST:-localhost}"
      NOTIFY_SMTP_PORT: "${NOTIFY_SMTP_PORT:-587}"
      NOTIFY_SMTP_USER: "${NOTIFY_SMTP_USER:-}"
      NOTIFY_SMTP_PASSWORD: "${NOTIFY_SMTP_PASSWORD:-}"
      NOTIFY_SMTP_TLS: "${NOTIFY_SMTP_TLS:-true}"
      NOTIFY_SMTP_SSL: "${NOTIFY_SMTP_SSL:-false}"
      NOTIFY_WEBHOOK_ENABLED: "${NOTIFY_WEBHOOK_ENABLED:-false}"
      NOTIFY_WEBHOOK_URL: "${NOTIFY_WEBHOOK_URL:-}"
      NOTIFY_WEBHOOK_SECRET: "${NOTIFY_WEBHOOK_SECRET:-}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - internal
      - proxy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: always
    networks:
      - proxy

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-openwhistle}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-openwhistle}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - internal

  redis:
    image: redis:8-alpine
    command: redis-server --save "" --appendonly no --requirepass "${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    driver: bridge
