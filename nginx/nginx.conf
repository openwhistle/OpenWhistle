worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Privacy: disable ALL access logging ─────────────────────────────
    # Required for whistleblower anonymity — nginx must never log IP addresses.
    # This disables the access log globally.
    access_log off;
    log_not_found off;

    # Server tokens (hide nginx version)
    server_tokens off;

    # ─── Upstream: OpenWhistle application ───────────────────────────────
    upstream openwhistle {
        server app:4009;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ─── Strip ALL IP-forwarding headers ─────────────────────────────
        # Even if an upstream CDN or proxy (Cloudflare, Traefik) adds these
        # headers, we strip them before passing to the application.
        # This ensures IP data cannot reach OpenWhistle under any circumstances.
        proxy_set_header X-Forwarded-For     "";
        proxy_set_header X-Real-IP           "";
        proxy_set_header Forwarded           "";
        proxy_set_header X-Client-IP         "";
        proxy_set_header X-Cluster-Client-IP "";
        proxy_set_header True-Client-IP      "";
        proxy_set_header CF-Connecting-IP    "";

        # Standard proxy headers (without IP)
        proxy_set_header Host               $host;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        location / {
            proxy_pass http://openwhistle;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }

        # Static files served directly by nginx for performance
        location /static/ {
            proxy_pass http://openwhistle;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── HTTPS server (production) ───────────────────────────────────────
    # Uncomment and configure for production with TLS certificates.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.example.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers off;
    #
    #     # Same IP-stripping and proxy settings as above
    #     proxy_set_header X-Forwarded-For     "";
    #     proxy_set_header X-Real-IP           "";
    #     # ... etc
    #
    #     location / {
    #         proxy_pass http://openwhistle;
    #     }
    # }
    #
    # # HTTP -> HTTPS redirect (access_log stays off)
    # server {
    #     listen 80;
    #     server_name your-domain.example.com;
    #     return 301 https://$host$request_uri;
    # }
}

# ─── Notes for operators using Cloudflare or other CDNs ──────────────────────
#
# If you run OpenWhistle behind Cloudflare:
# 1. Enable "Remove visitor IPs from logs" in Cloudflare dashboard
# 2. Do NOT use Cloudflare's "Restore visitor IP" feature (it adds CF-Connecting-IP)
# 3. The nginx config above strips CF-Connecting-IP, but you should also
#    configure Cloudflare to not add it to begin with.
#
# If you run OpenWhistle behind Traefik:
# - Set `headers.customRequestHeaders.X-Forwarded-For = ""` in your middleware
# - Set `headers.customRequestHeaders.X-Real-IP = ""`
# - Set `headers.customRequestHeaders.True-Client-IP = ""`
#
# After changing your proxy configuration, dismiss the IP warning in the
# OpenWhistle admin dashboard to confirm the fix.
